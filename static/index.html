<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MoMent</title>
  <meta name="description" content="&#xACE0;&#xACE0;&#xBBF8;&#xC220;&#xC0AC;&#xD559;&#xACFC; &#xBB38;&#xD654;&#xC720;&#xC0B0; &#xC0AC;&#xC9C4; &#xB3D9;&#xC544;&#xB9AC; MoMent">
  <meta property="og:title" content="MoMent">
  <meta property="og:description" content="&#xACE0;&#xACE0;&#xBBF8;&#xC220;&#xC0AC;&#xD559;&#xACFC; &#xBB38;&#xD654;&#xC720;&#xC0B0; &#xC0AC;&#xC9C4; &#xB3D9;&#xC544;&#xB9AC; MoMent">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MoMent">
  <meta name="twitter:description" content="&#xACE0;&#xACE0;&#xBBF8;&#xC220;&#xC0AC;&#xD559;&#xACFC; &#xBB38;&#xD654;&#xC720;&#xC0B0; &#xC0AC;&#xC9C4; &#xB3D9;&#xC544;&#xB9AC; MoMent">
{{SITE_META_TAGS}}
  <link rel="stylesheet" href="/static/css/site.css?v={{SITE_CSS_VERSION}}">
  <script src="/static/js/exhibition.js?v={{EXHIBITION_JS_VERSION}}" defer></script>
</head>
<body>
  <audio
    id="backgroundAudio"
    preload="none"
    playsinline
    data-tracks='["/static/audio/moment-bgm.mp3?v={{BGM_VERSION}}"]'
  ></audio>

  <div class="intro-overlay" id="introOverlay" aria-hidden="true">
    <div class="intro-shell">
      <div class="intro-copy" id="introCopy">
        <div class="intro-subtitle">&#xACE0;&#xACE0;&#xBBF8;&#xC220;&#xC0AC;&#xD559;&#xACFC; &#xBB38;&#xD654;&#xC720;&#xC0B0; &#xC0AC;&#xC9C4; &#xB3D9;&#xC544;&#xB9AC;</div>
        <div class="intro-title">MoMent</div>
        <div class="intro-lead">&#xD68C;&#xC7A5; &#xC2E0;&#xC6A9;&#xC740;</div>
      </div>
    </div>
  </div>

  <div class="history-overlay" id="historyOverlay" hidden>
    <div
      class="history-panel"
      id="historyPanel"
      role="dialog"
      aria-modal="true"
      aria-label="&#xB3D9;&#xC544;&#xB9AC; &#xC5F0;&#xD601;"
    >
      <div class="history-lines">
        <p class="history-heading">&#xACE0;&#xACE0;&#xBBF8;&#xC220;&#xC0AC;&#xD559;&#xACFC; &#xBB38;&#xD654;&#xC720;&#xC0B0; &#xC0AC;&#xC9C4; &#xB3D9;&#xC544;&#xB9AC; MoMent</p>
        <p class="history-line">2023 &#xD68C;&#xC7A5; 19&#xC11C;&#xB3D9;&#xC9C4;</p>
        <p class="history-line">2024 &#xD68C;&#xC7A5; 21&#xC815;&#xD0DC;&#xC6C5;</p>
        <p class="history-line">2025 &#xD68C;&#xC7A5; 24&#xC2E0;&#xC6A9;&#xC740;</p>
        <p class="history-line">2026 &#xD68C;&#xC7A5; 24&#xC2E0;&#xC6A9;&#xC740;</p>
      </div>
    </div>
  </div>

  <main class="site-shell">
    <h1 class="sr-only">MoMent Online Exhibition</h1>

    <header class="site-topbar" id="siteTopbar">
      <div class="site-nav-card">
        <button
          class="history-trigger"
          id="historyTrigger"
          type="button"
          aria-haspopup="dialog"
          aria-controls="historyOverlay"
          aria-expanded="false"
        >
          &#xB3D9;&#xC544;&#xB9AC; &#xC5F0;&#xD601;
        </button>

        <div class="site-brand">
          <a class="exhibition-logo" href="/">MoMent</a>
          <p class="site-credit" aria-hidden="true">&#xC2E0;&#xC6A9;&#xC740; &#xC81C;&#xC791;</p>
        </div>

        <div class="site-actions">
          <div class="visit-counter" id="visitCounter" aria-live="polite">&#xBC29;&#xBB38;&#xC790; -</div>
          <button class="audio-toggle" id="audioToggle" type="button" aria-pressed="false">
            &#xC74C;&#xC545; OFF
          </button>
        </div>
      </div>
    </header>

    <section class="exhibition-stream" id="photoStream" aria-live="polite"></section>

    <p class="empty-state" id="emptyState" hidden>&#xC804;&#xC2DC; &#xC900;&#xBE44; &#xC911;&#xC785;&#xB2C8;&#xB2E4;.</p>
  </main>

  <div class="lightbox" id="lightbox" hidden>
    <div
      class="lightbox-content"
      id="lightboxContent"
      role="dialog"
      aria-modal="true"
      aria-label="&#xC0AC;&#xC9C4; &#xD06C;&#xAC8C; &#xBCF4;&#xAE30;"
    >
      <div class="lightbox-image-shell" id="lightboxImageShell">
        <img class="lightbox-image" id="lightboxImage" alt="">
        <img class="lightbox-image lightbox-image-buffer" id="lightboxImageBuffer" alt="" aria-hidden="true">
      </div>
      <div class="lightbox-meta" id="lightboxMeta"></div>
    </div>
  </div>
</body>
</html>
