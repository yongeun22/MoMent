name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pip-audit

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Static export smoke test
        run: |
          python manage.py export-static --output dist-smoke
          test -f dist-smoke/index.html
          test -f dist-smoke/404.html
          test -f dist-smoke/data/photos.json
          test -f dist-smoke/_headers
