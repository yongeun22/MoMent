name: Bug report
description: Report a reproducible MoMent problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps, commands, or clicks.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "Python 3.13.x"
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Public exhibition
        - Admin app
        - Static export
        - Cloudflare Pages Functions
        - Documentation
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets, passwords, database contents, and private media before posting.
