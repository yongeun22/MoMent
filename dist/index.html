<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MoMent</title>
  <meta name="description" content="&#xACE0;&#xACE0;&#xBBF8;&#xC220;&#xC0AC;&#xD559;&#xACFC; &#xBB38;&#xD654;&#xC720;&#xC0B0; &#xC0AC;&#xC9C4; &#xB3D9;&#xC544;&#xB9AC; MoMent">
  <meta property="og:title" content="MoMent">
  <meta property="og:description" content="&#xACE0;&#xACE0;&#xBBF8;&#xC220;&#xC0AC;&#xD559;&#xACFC; &#xBB38;&#xD654;&#xC720;&#xC0B0; &#xC0AC;&#xC9C4; &#xB3D9;&#xC544;&#xB9AC; MoMent">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MoMent">
  <meta name="twitter:description" content="&#xACE0;&#xACE0;&#xBBF8;&#xC220;&#xC0AC;&#xD559;&#xACFC; &#xBB38;&#xD654;&#xC720;&#xC0B0; &#xC0AC;&#xC9C4; &#xB3D9;&#xC544;&#xB9AC; MoMent">
  <meta property="og:url" content="https://moment-exhibition.pages.dev/">
  <meta property="og:image" content="https://moment-exhibition.pages.dev/static/og/moment-share.png">
  <meta property="og:image:alt" content="MoMent">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:image" content="https://moment-exhibition.pages.dev/static/og/moment-share.png">
  <link rel="canonical" href="https://moment-exhibition.pages.dev/">

  <link rel="stylesheet" href="/static/css/site.css?v=18b30ec36d846e48-46a6">
  <script src="/static/js/exhibition.js?v=18b30ec7b42966b0-6d76" defer></script>
</head>
<body>
  <audio
    id="backgroundAudio"
    preload="none"
    playsinline
    data-tracks='["/static/audio/moment-bgm.mp3?v=18b066b6e2391638-440bf3"]'
  ></audio>

  <div class="intro-overlay" id="introOverlay" role="dialog" aria-modal="true" aria-label="MoMent 입장 안내">
    <div class="intro-shell">
      <div class="intro-brand">
        <div class="intro-subtitle">&#xACE0;&#xACE0;&#xBBF8;&#xC220;&#xC0AC;&#xD559;&#xACFC; &#xBB38;&#xD654;&#xC720;&#xC0B0; &#xC0AC;&#xC9C4; &#xB3D9;&#xC544;&#xB9AC;</div>
        <div class="intro-title">MoMent</div>
      </div>
      <div class="intro-guide">
        <p class="intro-instructions">사진을 클릭해 감상하세요.</p>
        <button class="intro-enter" id="introEnter" type="button">입장&gt;</button>
      </div>
    </div>
  </div>

  <div class="history-overlay info-overlay" id="historyOverlay" hidden>
    <div
      class="history-panel info-panel"
      id="historyPanel"
      role="dialog"
      aria-modal="true"
      aria-label="&#xC5F0;&#xD601;"
    >
      <div class="history-lines info-lines">
        <p class="history-heading info-heading">&#xACE0;&#xACE0;&#xBBF8;&#xC220;&#xC0AC;&#xD559;&#xACFC; &#xB3D9;&#xC544;&#xB9AC; MoMent</p>
        <p class="history-line info-line">2023 &#xD68C;&#xC7A5; 19&#xC11C;&#xB3D9;&#xC9C4;</p>
        <p class="history-line info-line">2024 &#xD68C;&#xC7A5; 21&#xC815;&#xD0DC;&#xC6C5;</p>
        <p class="history-line info-line">2025 &#xD68C;&#xC7A5; 24&#xC2E0;&#xC6A9;&#xC740;</p>
        <p class="history-line info-line">2026 &#xD68C;&#xC7A5; 24&#xC2E0;&#xC6A9;&#xC740;</p>
      </div>
    </div>
  </div>

  <div class="contact-overlay info-overlay" id="contactOverlay" hidden>
    <div
      class="contact-panel info-panel"
      id="contactPanel"
      role="dialog"
      aria-modal="true"
      aria-label="&#xBB38;&#xC758;"
    >
      <div class="contact-lines info-lines">
        <a
          class="contact-link"
          href="https://www.instagram.com/sy3un/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Instagram @sy3un"
        >
          <img class="contact-icon" src="/static/icons/instagram.svg" alt="">
          <span class="contact-handle">@sy3un</span>
        </a>
      </div>
    </div>
  </div>

  <div class="trace-overlay info-overlay" id="traceOverlay" hidden>
    <div
      class="trace-panel info-panel"
      id="tracePanel"
      role="dialog"
      aria-modal="true"
      aria-label="방명록"
    >
      <div class="trace-lines info-lines">
        <p class="trace-title" id="traceCountText">지금까지 -개의 방명록이 남았습니다</p>
        <p class="trace-note">한 번 남긴 방명록은 지울 수 없으니 신중하게 적어주세요.</p>
        <form class="trace-form" id="traceForm">
          <label class="trace-field">
            <span>소속</span>
            <input
              class="trace-input"
              type="text"
              name="affiliation"
              maxlength="80"
              autocomplete="organization"
              required
            >
          </label>
          <label class="trace-field">
            <span>이름</span>
            <input
              class="trace-input"
              type="text"
              name="name"
              maxlength="40"
              autocomplete="name"
              required
            >
          </label>
          <button class="trace-submit" type="submit">남기기</button>
          <p class="trace-status" id="traceStatus" role="status" aria-live="polite"></p>
        </form>
        <div class="trace-list" id="traceList" aria-live="polite"></div>
      </div>
    </div>
  </div>

  <main class="site-shell">
    <h1 class="sr-only">MoMent Online Exhibition</h1>

    <header class="site-topbar" id="siteTopbar">
      <div class="site-nav-card">
        <div class="site-links">
          <button
            class="history-trigger"
            id="historyTrigger"
            type="button"
            aria-haspopup="dialog"
            aria-controls="historyOverlay"
            aria-expanded="false"
          >
            &#xC5F0;&#xD601;
          </button>
          <span class="site-menu-separator" aria-hidden="true">&#x3163;</span>
          <button
            class="contact-trigger"
            id="contactTrigger"
            type="button"
            aria-haspopup="dialog"
            aria-controls="contactOverlay"
            aria-expanded="false"
          >
            &#xBB38;&#xC758;
          </button>
          <span class="site-menu-separator" aria-hidden="true">&#x3163;</span>
        </div>

        <div class="site-brand">
          <a class="exhibition-logo" href="/">MoMent</a>
        </div>

        <div class="site-actions">
          <span class="site-menu-separator" aria-hidden="true">&#x3163;</span>
          <span class="site-visitor-count" id="visitorCount" hidden>방문자 -</span>
          <span class="site-menu-separator site-visitor-separator" aria-hidden="true" hidden>&#x3163;</span>
          <button
            class="trace-trigger"
            id="traceTrigger"
            type="button"
            aria-haspopup="dialog"
            aria-controls="traceOverlay"
            aria-expanded="false"
          >
            방명록
          </button>
          <span class="site-menu-separator" aria-hidden="true">&#x3163;</span>
          <button class="audio-toggle" id="audioToggle" type="button" aria-pressed="false">
            &#xC74C;&#xC545; OFF
          </button>
        </div>
      </div>
    </header>

    <section class="exhibition-stream" id="photoStream" aria-live="polite"></section>

    <p class="empty-state" id="emptyState" hidden>&#xC804;&#xC2DC; &#xC900;&#xBE44; &#xC911;&#xC785;&#xB2C8;&#xB2E4;.</p>
  </main>

  <div class="lightbox" id="lightbox" hidden>
    <div
      class="lightbox-content"
      id="lightboxContent"
      role="dialog"
      aria-modal="true"
      aria-label="&#xC0AC;&#xC9C4; &#xD06C;&#xAC8C; &#xBCF4;&#xAE30;"
    >
      <div class="lightbox-image-shell" id="lightboxImageShell">
        <img class="lightbox-image" id="lightboxImage" alt="">
        <img class="lightbox-image lightbox-image-buffer" id="lightboxImageBuffer" alt="" aria-hidden="true">
      </div>
      <div class="lightbox-meta" id="lightboxMeta"></div>
    </div>
  </div>
</body>
</html>
